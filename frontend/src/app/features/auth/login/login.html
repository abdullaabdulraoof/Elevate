<h1>Login</h1>
<form [formGroup]="loginForm" (ngSubmit)="submitLogin()" style="margin-top:20px; max-width:300px;">
  <div style="margin-bottom:10px;">
    <input type="email" formControlName="email" placeholder="Email" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;" />
  </div>
  <div style="margin-bottom:10px;">
    <input type="password" formControlName="password" placeholder="Password" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;" />
  </div>
  @if (errorMessage()) {
    <div style="color:red; margin-bottom:10px;">{{ errorMessage() }}</div>
  }
  <button type="submit" [disabled]="isLoading()" style="padding:10px 20px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;">
    {{ isLoading() ? 'Please wait...' : 'Login' }}
  </button>
  <p style="margin-top:10px;">
    Don&apos;t have an account? <a routerLink="/register" style="color:#007bff;">Register</a>
  </p>
</form>
<div style="margin-top:20px; padding:12px; background:#f5f5f5; border-radius:4px; max-width:300px; font-size:13px;">
  <strong>Admin Demo:</strong><br>
  Email: admin@elevate.com<br>
  Password: admin123
</div>
