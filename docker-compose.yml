services:
  backend:
    build: ./backend
    container_name: gym-backend

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env

    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started

    restart: unless-stopped

  mongodb:
    image: mongo:8

    container_name: gym-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped

  redis:
    image: redis:7

    container_name: gym-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

volumes:
  mongo-data: