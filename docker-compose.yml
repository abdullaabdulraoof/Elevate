version: "3.9"

services:

  backend:
    build: ./backend
    container_name: gym-backend

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  mongodb:
    image: mongo:8

    container_name: gym-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:

  mongo-data: